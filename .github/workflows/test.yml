name: Run Jupyter Notebook to see model performance on new data and check for data drift

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  run-notebook:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install jupyter nbconvert ipykernel
          if [ -f requirements.txt ]; then
            python -m pip install -r requirements.txt
          fi

      - name: Verify Jupyter Installation
        run: |
          python --version
          python -m pip --version
          python -m jupyter --version

      - name: Execute Notebook
        run: |
          python -m jupyter nbconvert \
            --to notebook \
            --execute Data_drift.ipynb \
            --output executed_notebook.ipynb \
            --ExecutePreprocessor.timeout=600

      - name: Upload Executed Notebook
        uses: actions/upload-artifact@v4
        with:
          name: executed-notebook
          path: executed_notebook.ipynb
